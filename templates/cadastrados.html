<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Pacientes Cadastrados</title>

    <!-- Importando o Bootstrap 5 -->
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0-alpha1/dist/css/bootstrap.min.css" rel="stylesheet">
</head>
<body>    
    <div class="container">
        <nav>
            <div class="container-fluid">
                <br>
                <a class="btn btn-outline-success" href="/formulario" role="button">Formulário</a>
                <button class="btn btn-outline-danger" id="logout" type="submit" role="button">Logout</button>
            </div>
        </nav>
        
        <h1 class="text-center mb-4"><br>Pacientes Cadastrados</h1>
        
        <!-- Filtros de Pesquisa -->
        <div class="row mb-5">
            <div class="col-md-4">
                <label class="form-label">Id_paciente</label>
                <input type="text" class="form-control" id="pesquisa-id_cliente">
            </div>

            <div class="col-md-4">
                <label class="form-label">Nome</label>
                <input type="text" class="form-control" id="pesquisa-nome">
            </div>
            <div class="col-md-4">
                <label class="form-label">Data de Nascimento</label>
                <input type="number" class="form-control" id="pesquisa-data_nasc">
            </div>
            <div class="col-md-4">
                <label class="form-label">Sexo</label>
                <input type="text" class="form-control" id="pesquisa-sexo">
            </div>
            <div class="col-md-4">
                <label class="form-label">Profissão</label>
                <input type="text" class="form-control" id="pesquisa-profissao">
            </div>

            <div class="col-md-4">
                <label class="form-label">Idade</label>
                <input type="number" class="form-control" id="pesquisa-idade">
            </div>

        </div>

        <!-- Tabela de Dados dos Clientes -->
        <div id="clientes-lista">
            <table class="table table-striped table-bordered">
                <thead class="table-dark">
                    <tr>
                        <th>id_paciente</th>
                        <th>Nome</th>
                        <th>Data de Nascimento</th>
                        <th>Sexo</th>
                        <th>Telefone Residencial</th>
                        <th>Profissão</th>
                        <th>Idade</th>
                    </tr>
                </thead>
                <tbody id="dados-clientes">
                    <!-- Dados preenchidos dinamicamente aqui -->
                </tbody>
            </table>

            <!-- Caso não haja dados -->
            <div id="sem-dados" class="no-data" style="display: none;">
                <p>Não há clientes cadastrados.</p>
            </div>
        </div>
    </div>

    <!-- Importando o JavaScript do Bootstrap -->
    <script src="https://cdn.jsdelivr.net/npm/@popperjs/core@2.11.6/dist/umd/popper.min.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0-alpha1/dist/js/bootstrap.min.js"></script>
    <script src="static/cadastrados.js"></script>

</body>
</html>
